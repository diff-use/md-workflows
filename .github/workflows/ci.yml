name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Python code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff lint check
        run: ruff check md_workflows tests

      - name: Run ruff format check
        run: ruff format --check md_workflows tests

  docker-pull-run:
    name: Docker Pull and Run
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull Docker image
        run: docker pull diffuseproject/md:latest

      - name: Run Docker container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            diffuseproject/md:latest \
            bash -c "echo 'Container started successfully' && ls -la"

      - name: Run tests in container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            diffuseproject/md:latest \
            bash -c "python3 -m unittest discover -s tests/tests -p 'test_*.py' -v"
